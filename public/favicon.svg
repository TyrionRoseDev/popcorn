<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bucket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF2D78"/>
      <stop offset="100%" stop-color="#cc1a5e"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffff0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fffff0" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Bucket body - trapezoid -->
  <path d="M30 52 L38 116 L90 116 L98 52 Z" fill="url(#bucket)" stroke="#ff4d90" stroke-width="1.5"/>
  <!-- Bucket stripes -->
  <path d="M52 52 L54 116" stroke="url(#stripe)" stroke-width="4" stroke-linecap="round"/>
  <path d="M75 52 L73 116" stroke="url(#stripe)" stroke-width="4" stroke-linecap="round"/>
  <!-- Bucket rim -->
  <rect x="26" y="48" width="76" height="8" rx="3" fill="#ff4d90" stroke="#FF2D78" stroke-width="1"/>
  <!-- Popcorn kernels -->
  <g filter="url(#glow)">
    <!-- Bottom row -->
    <circle cx="44" cy="42" r="11" fill="#fffff0"/>
    <circle cx="64" cy="40" r="12" fill="#FFB800"/>
    <circle cx="84" cy="42" r="11" fill="#fffff0"/>
    <!-- Top row -->
    <circle cx="34" cy="34" r="9" fill="#FFB800"/>
    <circle cx="54" cy="28" r="10" fill="#fffff0"/>
    <circle cx="74" cy="26" r="11" fill="#FFB800"/>
    <circle cx="92" cy="33" r="9" fill="#fffff0"/>
    <!-- Peak kernels -->
    <circle cx="44" cy="20" r="8" fill="#fffff0"/>
    <circle cx="64" cy="16" r="9" fill="#FFB800"/>
    <circle cx="82" cy="20" r="8" fill="#fffff0"/>
  </g>
</svg>
